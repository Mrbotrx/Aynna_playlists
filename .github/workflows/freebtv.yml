name: Auto Update BDTv M3U8

on:

  workflow_dispatch:

  schedule:
    - cron: "0 */2 * * *"


permissions:
  contents: write


jobs:

  update:

    runs-on: ubuntu-latest


    steps:


      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0



      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"



      - name: Install Requests
        run: |
          pip install requests



      - name: Generate bdt.m3u8
        run: |
          python bd.py



      - name: Check Output
        run: |
          echo "===== FILE ====="
          ls -lh bdt.m3u8
          cat bdt.m3u8



      - name: Commit Update
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add bdt.m3u8

          git commit -m "Update bdt.m3u8" || echo "No changes"

          git push
