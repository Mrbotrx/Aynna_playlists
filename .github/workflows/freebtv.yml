name: Auto Update BTV Playlist


on:

  schedule:

    # Every 2 hours
    - cron: "0 */2 * * *"


  workflow_dispatch:



permissions:

  contents: write



jobs:


  update:


    runs-on: ubuntu-latest


    steps:


      - name: Checkout
        uses: actions/checkout@v4



      - name: Setup Python
        uses: actions/setup-python@v5

        with:

          python-version: "3.11"



      - name: Install package
        run: |

          pip install -r requirements.txt



      - name: Generate m3u8
        run: |

          python bd.py



      - name: Save file
        run: |

          git config user.name "github-actions"

          git config user.email "github-actions@github.com"

          git add bdt.m3u8

          git commit -m "Auto update bdt.m3u8" || echo "No change"

          git push
