name: Auto Update BDTv Playlist

on:
  schedule:
    - cron: "0 */2 * * *"

  workflow_dispatch:


permissions:
  contents: write


jobs:
  update-playlist:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"


      - name: Install
        run: pip install requests


      - name: Generate playlist
        run: python bd.py


      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add bdt.m3u8

          git commit -m "Update BDTv playlist" || exit 0

          git pushpush

      - name: Save updated playlist
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add bdt.m3u8

          git commit -m "Auto update BDTv playlist" || echo "No changes"

          git push
