name: Update BDTV M3U8

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Install
        run: |
          pip install requests


      - name: Generate playlist
        run: |
          python bd.py


      - name: Check file
        run: |
          echo "FILE:"
          cat bdt.m3u8


      - name: Force update time
        run: |
          echo "# Updated $(date)" >> bdt.m3u8


      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add bdt.m3u8

          git commit -m "Auto update bdt.m3u8 $(date)" || true

          git pushpush
