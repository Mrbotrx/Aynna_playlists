name: Auto Update BDTv Playlist

on:

  workflow_dispatch:

  schedule:
    - cron: "0 */2 * * *"


permissions:
  contents: write


jobs:

  update:

    runs-on: ubuntu-latest


    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Install Requests
        run: |
          pip install requests


      - name: Generate Playlist
        run: |
          python bd.py


      - name: Check File
        run: |
          echo "===== bdt.m3u8 ====="
          ls -lh bdt.m3u8
          head -20 bdt.m3u8


      - name: Commit Update
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f bdt.m3u8

          git commit -m "Auto update bdt.m3u8 $(date)" || echo "No changes"

          git push origin HEAD:${{ github.ref }}
