name: Update Aynnaott Playlist

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */6 * * *"


permissions:
  contents: write


jobs:

  update:

    runs-on: ubuntu-latest


    steps:

    - name: Checkout Repository

      uses: actions/checkout@v4

      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        persist-credentials: true



    - name: Setup Python

      uses: actions/setup-python@v5

      with:
        python-version: "3.x"



    - name: Install Requirements

      run: |

        pip install -r requirements.txt



    - name: Generate Aynnaott Playlist

      env:

        AYNAOTT_API_URL: ${{ secrets.AYNAOTT_API_URL }}

      run: |

        python main.py



    - name: Check Output File

      run: |

        echo "Checking output..."

        ls -la

        ls -la output

        test -f output/aynnaott.m3u8



    - name: Commit Playlist

      run: |

        git config --global user.name "github-actions[bot]"

        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

        git add -f output/aynnaott.m3u8

        git commit -m "Update aynnaott playlist" || echo "No changes"

        git push
