name: Update Aynnaott Playlist


on:

  workflow_dispatch:

  schedule:

    - cron: "0 */6 * * *"



permissions:

  contents: write



jobs:


  update:


    runs-on: ubuntu-latest


    steps:


    - name: Checkout

      uses: actions/checkout@v4



    - name: Setup Python

      uses: actions/setup-python@v5

      with:

        python-version: "3.x"



    - name: Install

      run: |

        pip install -r requirements.txt



    - name: Generate Playlist

      env:

        AYNAOTT_API_URL: ${{ secrets.AYNAOTT_API_URL }}

      run: |

        python main.py



    - name: Check Files

      run: |

        ls -la

        ls -la output



    - name: Commit Files

      run: |

        git config --global user.name "github-actions[bot]"

        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

        git add -f output/aynnaott.m3u8

        git add -f output/aynaott_api.json

        git commit -m "Auto update playlist" || echo "No changes"

        git push
