name: Update Playlist

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */6 * * *"


jobs:

  update:

    runs-on: ubuntu-latest


    steps:

    - uses: actions/checkout@v4


    - uses: actions/setup-python@v5

      with:
        python-version: "3.x"


    - run: pip install -r requirements.txt


    - name: Run Script

      env:

        AYNAOTT_API_URL: ${{ secrets.AYNAOTT_API_URL }}

      run: python main.py


    - name: Save Playlist

      run: |

        git add .

        git commit -m "Update aynnaott playlist" || true

        git push
