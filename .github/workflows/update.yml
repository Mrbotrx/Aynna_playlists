name: Update AynaOTT Playlist


on:

  workflow_dispatch:

  schedule:

    - cron: "0 */6 * * *"



jobs:

  build:


    runs-on: ubuntu-latest


    steps:


    - name: Checkout

      uses: actions/checkout@v4



    - name: Python Setup

      uses: actions/setup-python@v5

      with:

        python-version: "3.x"



    - name: Install packages

      run: |

        pip install -r requirements.txt



    - name: Run Finder

      env:

        AYNAOTT_API_URL: ${{ secrets.AYNAOTT_API_URL }}

      run: |

        python main.py
